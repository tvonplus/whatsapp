<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV ON+ | Cadastro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    /* Fundo escuro com um degradê sutil puxado para o roxo bem escuro no centro */
    background:linear-gradient(135deg,#0a0514,#120924,#000);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

.container{
    width:90%;
    max-width:430px;
    background:#120d1c; /* Fundo do painel em roxo escuro quase preto */
    border:2px solid #7c3aed; /* Borda Roxa */
    border-radius:18px;
    padding:35px;
    text-align:center;
    box-shadow:0 0 30px rgba(124, 58, 237, 0.3); /* Brilho neon roxo */
}

.logo{
    width:170px;
    margin-bottom:25px;
    /* Adiciona um leve realce atrás do logo */
    filter: drop-shadow(0 4px 8px rgba(124, 58, 237, 0.2));
}

h1{
    font-size:28px;
    color:#ffffff;
    margin-bottom:10px;
}

h1 span{
    color:#a78bfa; /* Tom de roxo claro/neon para destacar o texto */
}

p{
    color:#cfcfcf;
    font-size:16px;
    line-height:1.6;
    margin-bottom:30px;
}

.btn{
    display:block;
    text-decoration:none;
    padding:16px;
    margin:15px 0;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn-cadastro{
    background: linear-gradient(90deg, #7c3aed, #9333ea); /* Degradê roxo moderno */
    color:#fff;
    box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
}

.btn-cadastro:hover{
    filter: brightness(1.2);
    transform:translateY(-2px);
    box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
}

.btn-whatsapp{
    background:#25D366;
    color:#fff;
}

.btn-whatsapp:hover{
    background:#1ebe5d;
    transform:translateY(-2px);
}

.footer{
    margin-top:25px;
    color:#6b627a;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

    <img src="/logo.png" class="logo" alt="TV ON+">

    <h1>Bem-vindo à <span>TV ON+</span></h1>

    <p>
        Escolha uma das opções abaixo para começar.
    </p>

    <a class="btn btn-cadastro"
       href="https://netplay.mplll.com/#/rs/YgD9mq9Dr6/231qyzR14q"
       target="_blank">
        🚀 Fazer Cadastro
    </a>

    <a class="btn btn-whatsapp"
       href="https://wa.me/5512996837180?text=Ol%C3%A1%21%20Vi%20seu%20an%C3%BAncio%20no%20Instagram%20e%20gostaria%20de%20mais%20informa%C3%A7%C3%B5es."
       target="_blank">
        💬 Falar no WhatsApp
    </a>

    <div class="footer">
        Atendimento rápido • Suporte via WhatsApp
    </div>

</div>

</body>
</html>
