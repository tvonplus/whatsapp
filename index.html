<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV ON+ | Cadastro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#09040f,#1d1035,#3c146b);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    background:#8f3dff;
    filter:blur(180px);
    top:-120px;
    right:-120px;
    opacity:.35;
}

body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    background:#5a00ff;
    filter:blur(180px);
    bottom:-120px;
    left:-120px;
    opacity:.35;
}

.card{
    position:relative;
    z-index:2;
    width:92%;
    max-width:420px;
    padding:40px 30px;
    border-radius:22px;
    background:rgba(18,18,18,.75);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.08);
    box-shadow:0 0 50px rgba(143,61,255,.35);
    text-align:center;
}

.logo{
    width:190px;
    margin-bottom:25px;
}

h1{
    color:#fff;
    font-size:30px;
    margin-bottom:10px;
}

p{
    color:#cfcfcf;
    font-size:15px;
    margin-bottom:30px;
    line-height:1.7;
}

.btn{
    display:block;
    text-decoration:none;
    padding:17px;
    border-radius:14px;
    margin-top:15px;
    font-size:17px;
    font-weight:600;
    transition:.3s;
}

.cadastro{
    background:linear-gradient(90deg,#7a1fff,#b14dff);
    color:#fff;
    box-shadow:0 0 20px rgba(143,61,255,.45);
}

.cadastro:hover{
    transform:translateY(-3px);
    box-shadow:0 0 35px rgba(177,77,255,.65);
}

.whatsapp{
    background:#25D366;
    color:#fff;
}

.whatsapp:hover{
    background:#1fb85a;
    transform:translateY(-3px);
}

.info{
    margin-top:25px;
    color:#9b9b9b;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<img src="https://tvonplus.github.io/mensalista/logo.png" class="logo" alt="TV ON+">

<h1>Bem-vindo!</h1>

<p>
Cadastre-se agora ou fale diretamente com nosso atendimento pelo WhatsApp.
</p>

<a class="btn cadastro"
href="https://netplay.mplll.com/#/rs/YgD9mq9Dr6/231qyzR14q"
target="_blank">
🚀 Fazer Cadastro
</a>

<a class="btn whatsapp"
href="https://wa.me/5512996837180?text=Olá!%20Vi%20seu%20anúncio%20no%20Instagram%20e%20gostaria%20de%20mais%20informações."
target="_blank">
💬 Falar no WhatsApp
</a>

<div class="info">
Atendimento rápido • TV ON+
</div>

</div>

</body>
</html>
